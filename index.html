<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyPi Remote Access</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2b;
      --card2:#0f172a;
      --accent:#3b82f6;
      --accent2:#60a5fa;
      --ok:#22c55e;
      --bad:#ef4444;
      --text:#e5e7eb;
      --muted:#94a3b8;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,Arial;
      background:radial-gradient(circle at 20% 10%,#0f1b33 0%,#0b1220 40%,#0a0f1a 100%);
      color:var(--text);
    }

    header{
      padding:18px 24px;
      font-size:22px;
      font-weight:700;
      letter-spacing:.5px;
      background:rgba(0,0,0,.25);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.06);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .brand{display:flex;gap:10px;align-items:center}
    .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}

    .wrap{max-width:1000px;margin:auto;padding:28px}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:22px;
    }

    .card{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    h2{margin:0 0 14px}
    h3{margin:18px 0 10px}

    input,button{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:#0b1324;
      color:var(--text);
      margin:8px 0;
      font-size:14px;
    }

    input::placeholder{color:#64748b}

    button{
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border:none;
      font-weight:600;
      cursor:pointer;
      transition:.15s transform,.15s opacity,.15s box-shadow;
      box-shadow:0 6px 18px rgba(59,130,246,.25);
    }

    button:hover{transform:translateY(-1px);opacity:.95}
    button.secondary{background:#1f2937;box-shadow:none}
    button.ghost{background:transparent;border:1px solid rgba(255,255,255,.15);box-shadow:none}

    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row > *{flex:1}

    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:600;
    }

    .ok{background:rgba(34,197,94,.15);color:var(--ok)}
    .bad{background:rgba(239,68,68,.15);color:var(--bad)}
    .muted{color:var(--muted);font-size:13px}

    .hidden{display:none}
    .msg{font-size:13px;margin-top:6px}

    .footerBar{
      position:fixed;
      bottom:18px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(15,23,42,.9);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px 16px;
      display:flex;
      gap:14px;
      align-items:center;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .footerBar button{margin:0;width:auto;padding:10px 14px}

    /* Modal */
    .modalWrap{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:50;
    }

    .modal{
      width:min(92vw,420px);
      background:linear-gradient(180deg,#111827,#0b1220);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:22px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      animation:pop .18s ease-out;
    }

    @keyframes pop{from{transform:scale(.96);opacity:.6}to{transform:scale(1);opacity:1}}

    .price{
      font-size:28px;
      font-weight:800;
      margin:10px 0;
    }
  </style>
</head>
<body>
<header>
  <div class="brand">
    <div class="dot"></div>
    EasyPi — Remote Raspberry Pi Access
  </div>
</header>

<div class="wrap">
  <div class="grid">

    <!-- AUTH -->
    <div id="authCard" class="card">
      <h2>Sign In</h2>

      <button id="googleBtn">Continue with Google</button>

      <div class="muted" style="margin:10px 0;text-align:center">or</div>

      <input id="emailInput" type="email" placeholder="Email address" />
      <input id="passwordInput" type="password" placeholder="Password" />

      <div class="row">
        <button id="loginBtn">Login</button>
        <button id="signupBtn" class="secondary">Sign Up</button>
      </div>

      <div id="authMsg" class="msg"></div>
    </div>

    <!-- USER APP -->
    <div id="appCard" class="card hidden">
      <h2>Your Account</h2>
      <div class="muted">Signed in as</div>
      <div style="font-weight:600;margin-bottom:12px" id="userEmail"></div>

      <div>
        <span id="statusPill" class="pill">Checking…</span>
      </div>
      <div class="muted" style="margin-top:6px">
        Access expires: <span id="expiryText">—</span>
      </div>

      <h3>Remote Control</h3>
      <button id="connectBtn">Connect to Raspberry Pi</button>
      <div class="muted">Secure remote session via your device tunnel</div>

      <hr style="border-color:rgba(255,255,255,.08);margin:18px 0">
      <button id="logoutBtn" class="secondary">Logout</button>
    </div>

  </div>
</div>

<!-- Subscription Modal -->
<div id="payModal" class="modalWrap hidden">
  <div class="modal">
    <h2>Subscription Required</h2>
    <div class="muted">Get full remote access to your Raspberry Pi</div>
    <div class="price">£2<span style="font-size:14px;font-weight:600"> / month</span></div>
    <button id="subscribeBtn">Subscribe Now</button>
    <button id="laterBtn" class="ghost">Maybe later</button>
  </div>
</div>

<!-- Active Footer -->
<div id="activeBar" class="footerBar hidden">
  <span class="muted">Subscription active</span>
  <button id="manageBtn" class="secondary">Manage</button>
</div>

<script>
// ================= Firebase Config =================
const firebaseConfig = {
  apiKey: "AIzaSyD-pAnfOlyo5BY5vel9b8oUPaztlHeAAQU",
  authDomain: "easypi-85674.firebaseapp.com",
  databaseURL: "https://easypi-85674-default-rtdb.firebaseio.com",
  projectId: "easypi-85674",
  storageBucket: "easypi-85674.firebasestorage.app",
  messagingSenderId: "686355179435",
  appId: "1:686355179435:web:600cd3079ae3884e8c54ee",
  measurementId: "G-8PD84HNLP7"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

// ================= UI Refs =================
const authCard = document.getElementById('authCard');
const appCard = document.getElementById('appCard');
const payModal = document.getElementById('payModal');
const activeBar = document.getElementById('activeBar');

const emailInput = document.getElementById('emailInput');
const passwordInput = document.getElementById('passwordInput');
const authMsg = document.getElementById('authMsg');

const userEmailEl = document.getElementById('userEmail');
const statusPill = document.getElementById('statusPill');
const expiryText = document.getElementById('expiryText');

// ================= Helpers =================
function isActive(expiry){
  return expiry && new Date(expiry) > new Date();
}

function setStatus(active){
  if(active){
    statusPill.textContent = 'Active';
    statusPill.className = 'pill ok';
  } else {
    statusPill.textContent = 'Inactive';
    statusPill.className = 'pill bad';
  }
}

let modalDismissed = false; // stays dismissed until user signs out
function openModal(){
  if(modalDismissed) return;
  payModal.classList.remove('hidden');
}
function closeModal(){ payModal.classList.add('hidden'); }

// ================= Auth =================
document.getElementById('googleBtn').onclick = async ()=>{
  authMsg.textContent = '';
  try{ await auth.signInWithPopup(provider); }
  catch(e){ authMsg.textContent = e.message; }
};

// LOGIN

document.getElementById('loginBtn').onclick = async ()=>{
  authMsg.textContent='';
  try{
    await auth.signInWithEmailAndPassword(
      emailInput.value.trim(),
      passwordInput.value.trim()
    );
  }catch(e){ authMsg.textContent = e.message; }
};

// SIGNUP

document.getElementById('signupBtn').onclick = async ()=>{
  authMsg.textContent='';
  try{
    await auth.createUserWithEmailAndPassword(
      emailInput.value.trim(),
      passwordInput.value.trim()
    );
  }catch(e){ authMsg.textContent = e.message; }
};

// LOGOUT

document.getElementById('logoutBtn').onclick = ()=>{
  modalDismissed = false; // allow modal again next login
  auth.signOut();
};

// ================= Auth State =================
auth.onAuthStateChanged(async user=>{

  if(!user){
    authCard.classList.remove('hidden');
    appCard.classList.add('hidden');
    activeBar.classList.add('hidden');
    closeModal();
    return;
  }

  authCard.classList.add('hidden');
  appCard.classList.remove('hidden');

  userEmailEl.textContent = user.email;
  await db.ref('users/'+user.uid+'/email').set(user.email);

  const snap = await db.ref('users/'+user.uid).get();
  const data = snap.val() || {};

  const active = isActive(data.accessExpires);
  setStatus(active);
  expiryText.textContent = active
    ? new Date(data.accessExpires).toLocaleString()
    : '—';

  if(active){
    activeBar.classList.remove('hidden');
    closeModal();
  } else {
    activeBar.classList.add('hidden');
    openModal(); // only shows when signed in AND inactive
  }
});

// ================= UI Actions =================

document.getElementById('laterBtn').onclick = ()=>{
  modalDismissed = true;
  closeModal();
};

payModal.addEventListener('click', e=>{
  if(e.target === payModal) closeModal();
});

// Stripe placeholder

document.getElementById('subscribeBtn').onclick = ()=>{
  alert('Stripe checkout will connect here');
};

// Manage placeholder

document.getElementById('manageBtn').onclick = ()=>{
  alert('Customer portal will open here');
};

// Connect placeholder

document.getElementById('connectBtn').onclick = ()=>{
  alert('Secure Pi tunnel will connect here');
};
</script>
</body>
</html>
