<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pi Remote Access</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
    body{font-family:Arial;margin:0;background:#0f172a;color:#e2e8f0}
    header{background:#111827;padding:16px;font-size:20px;font-weight:bold}
    .container{max-width:900px;margin:auto;padding:20px}
    .card{background:#1f2937;padding:16px;border-radius:12px;margin-bottom:16px}
    input,select,button{padding:10px;margin:6px 0;border-radius:8px;border:none}
    input,select{width:100%}
    button{cursor:pointer;background:#2563eb;color:white}
    button.secondary{background:#374151}
    .hidden{display:none}
    .success{color:#22c55e}
    .danger{color:#ef4444}
  </style>
</head>
<body>
<header>Pi Remote Access</header>
<div class="container">

  <div id="authCard" class="card">
    <h2>Login / Sign Up</h2>
    <button id="googleBtn">Sign in with Google</button>
    <hr/>
    <input id="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <button id="emailLoginBtn">Login / Sign Up</button>
    <p id="authMsg"></p>
  </div>

  <div id="appCard" class="card hidden">
    <h2>Account</h2>
    <p><b>User:</b> <span id="userEmail"></span></p>
    <p><b>Status:</b> <span id="statusText">Checking...</span></p>
    <p><b>Access Expires:</b> <span id="expiryText">—</span></p>

    <h3>Online Subscription</h3>
    <button id="subscribeBtn">Subscribe £2 / month</button>

    <h3>Access Code</h3>
    <input id="codeInput" placeholder="Enter access code" />
    <button id="redeemBtn">Redeem Code</button>
    <p id="codeMsg"></p>

    <hr/>
    <button id="logoutBtn" class="secondary">Logout</button>
  </div>

  <div id="adminCard" class="card hidden">
    <h2>Admin Panel</h2>
    <input id="adminEmail" placeholder="User email" />
    <select id="durationSelect">
      <option value="7">7 days</option>
      <option value="30">30 days</option>
      <option value="90">90 days</option>
      <option value="365">365 days</option>
    </select>
    <button id="grantBtn">Grant Access (Cash)</button>
    <p id="adminMsg"></p>
  </div>

</div>

<script>
// ================= Firebase Config =================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

// ================= Helpers =================
function daysFromNow(days){
  const d = new Date();
  d.setDate(d.getDate()+Number(days));
  return d.toISOString();
}

function isActive(expiry){
  return expiry && new Date(expiry) > new Date();
}

// ================= Auth =================
const authCard = document.getElementById('authCard');
const appCard = document.getElementById('appCard');
const adminCard = document.getElementById('adminCard');

const userEmailSpan = document.getElementById('userEmail');
const statusText = document.getElementById('statusText');
const expiryText = document.getElementById('expiryText');

const authMsg = document.getElementById('authMsg');
const codeMsg = document.getElementById('codeMsg');
const adminMsg = document.getElementById('adminMsg');


document.getElementById('googleBtn').onclick = ()=>{
  auth.signInWithPopup(provider).catch(e=>authMsg.textContent=e.message);
};


document.getElementById('emailLoginBtn').onclick = ()=>{
  const email = email.value;
  const pass = password.value;
  auth.signInWithEmailAndPassword(email,pass)
    .catch(()=>auth.createUserWithEmailAndPassword(email,pass))
    .catch(e=>authMsg.textContent=e.message);
};


document.getElementById('logoutBtn').onclick = ()=>auth.signOut();

// ================= Auth State =================
auth.onAuthStateChanged(async user=>{
  if(!user){
    authCard.classList.remove('hidden');
    appCard.classList.add('hidden');
    adminCard.classList.add('hidden');
    return;
  }

  authCard.classList.add('hidden');
  appCard.classList.remove('hidden');
  userEmailSpan.textContent = user.email;

  const snap = await db.ref('users/'+user.uid).get();
  const data = snap.val() || {};

  if(isActive(data.accessExpires)){
    statusText.textContent = 'Active ✅';
    statusText.className='success';
    expiryText.textContent = new Date(data.accessExpires).toLocaleString();
  } else {
    statusText.textContent = 'Not Active ❌';
    statusText.className='danger';
    expiryText.textContent = '—';
  }

  const adminSnap = await db.ref('admins/'+user.uid).get();
  if(adminSnap.exists()) adminCard.classList.remove('hidden');
});

// ================= Access Code =================
document.getElementById('redeemBtn').onclick = async ()=>{
  const code = codeInput.value.trim();
  if(!code) return;

  const codeRef = db.ref('codes/'+code);
  const snap = await codeRef.get();
  if(!snap.exists()){ codeMsg.textContent='Invalid code'; return; }

  const c = snap.val();
  if(!c.valid){ codeMsg.textContent='Code already used'; return; }

  const user = auth.currentUser;
  await db.ref('users/'+user.uid).update({
    accessExpires: daysFromNow(c.duration),
    paymentType: 'code'
  });

  await codeRef.update({ valid:false, usedBy:user.uid });
  codeMsg.textContent='Access granted!';
  location.reload();
};

// ================= Admin Grant =================
document.getElementById('grantBtn').onclick = async ()=>{
  const emailVal = adminEmail.value.trim();
  const days = durationSelect.value;
  if(!emailVal) return;

  const usersSnap = await db.ref('users').get();
  let uid=null;
  usersSnap.forEach(child=>{
    if(child.val().email===emailVal) uid=child.key;
  });

  if(!uid){ adminMsg.textContent='User not found'; return; }

  await db.ref('users/'+uid).update({
    accessExpires: daysFromNow(days),
    paymentType: 'cash'
  });

  adminMsg.textContent='Access granted';
};

// ================= Stripe Placeholder =================
document.getElementById('subscribeBtn').onclick = ()=>{
  alert('Stripe Checkout goes here');
};

// ================= Save Email to DB =================
auth.onAuthStateChanged(user=>{
  if(!user) return;
  db.ref('users/'+user.uid+'/email').set(user.email);
});

</script>
</body>
</html>
